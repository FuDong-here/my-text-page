<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音乐循环播放与音量控制</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .controls {
            margin-top: 20px;
        }
        input {
            width: 300px;
            vertical-align: middle;
        }
        /* 可选：添加一个提示层，引导用户点击 */
        #clickPrompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>
    <!-- 可选：全屏提示层，点击后消失并播放音乐 -->
    <div id="clickPrompt">点击任意位置开始播放音乐</div>

    <h2>背景音乐</h2>
    <audio id="bgMusic" loop>
        <source src="相见欢.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
    </audio>

    <div class="controls">
        <button onclick="playMusic()">播放</button>
        <button onclick="pauseMusic()">暂停</button>
        <br><br>
        <label>音量：</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.10">
        <span id="volumeValue">10%</span>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const clickPrompt = document.getElementById('clickPrompt');

        audio.volume = volumeSlider.value;
        volumeValue.textContent = Math.round(volumeSlider.value * 100) + '%';

        // ========== 自动播放核心代码 ==========
        // 定义一个函数，用于开始播放并移除提示层
        function startAudio() {
            audio.play().then(() => {
                if (clickPrompt) clickPrompt.style.display = 'none';
            }).catch(e => console.log('播放失败:', e));
            // 移除事件监听，避免重复触发
            document.body.removeEventListener('click', startAudio);
        }

        // 监听整个页面的点击事件（只触发一次）
        document.body.addEventListener('click', startAudio);
        // =================================

        volumeSlider.addEventListener('input', function() {
            audio.volume = this.value;
            volumeValue.textContent = Math.round(this.value * 100) + '%';
        });

        function playMusic() {
            audio.play();
        }

        function pauseMusic() {
            audio.pause();
        }
    </script>
</body>
</html>
